name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # VALIDATE
  validate:
    name: Check required files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify required files
        run: |
          echo "Checking Sprint 0 deliverables..."
          test -f README.md
          test -f SKELETON.md
          test -f STYLE.md
          test -f ROLES.md
          test -f .gitignore
          test -f LOGO.png
          test -d RESEARCH
          echo "All required files present."

  # BACKEND BUILD
  build-backend:
    name: Build backend
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('backend/build.gradle', 'backend/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-
      - name: Build backend
        working-directory: backend
        run: |
          chmod +x gradlew
          ./gradlew build -x test

  # BACKEND UNIT TESTS + COVERAGE
  test-backend:
    name: Test backend (unit + coverage)
    runs-on: ubuntu-latest
    needs: build-backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('backend/build.gradle', 'backend/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-
      - name: Run unit tests + coverage
        working-directory: backend
        run: |
          chmod +x gradlew
          ./gradlew testUnit jacocoTestReport jacocoTestCoverageVerification
          awk -F"," '{ instructions += $4 + $5; covered += $5 } END { printf "Total: %.2f%%\n", covered/instructions*100 }' build/reports/jacoco/test/jacocoTestReport.csv
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            backend/build/reports/tests/testUnit/
            backend/build/test-results/testUnit/
            backend/build/reports/jacoco/test/html/
            backend/build/reports/jacoco/test/jacocoTestReport.xml

  # BACKEND SCHEMA / INTEGRATION TESTS
  test-schema:
    name: Test backend (schema/integration)
    runs-on: ubuntu-latest
    needs: build-backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('backend/build.gradle', 'backend/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-
      - name: Run integration tests
        working-directory: backend
        run: |
          chmod +x gradlew
          ./gradlew testIntegration
      - name: Upload integration reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-integration-reports
          path: |
            backend/build/reports/tests/testIntegration/
            backend/build/test-results/testIntegration/

  # FRONTEND BUILD
  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install + build
        working-directory: frontend
        run: |
          npm ci
          npm run build

  # FRONTEND TESTS + COVERAGE
  test-frontend:
    name: Test frontend
    runs-on: ubuntu-latest
    needs: build-frontend
    env:
      JEST_JUNIT_OUTPUT_DIR: ${{ github.workspace }}/frontend
      JEST_JUNIT_OUTPUT_NAME: junit.xml
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install + test
        working-directory: frontend
        run: |
          npm ci
          npm test -- --watchAll=false --passWithNoTests --coverage \
            --coverageReporters=text --coverageReporters=text-summary \
            --coverageReporters=html --coverageReporters=cobertura \
            --reporters=default --reporters=jest-junit
      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-reports
          path: |
            frontend/junit.xml
            frontend/coverage/

  # FRONTEND LINT
  lint-frontend:
    name: Lint frontend
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install + lint
        working-directory: frontend
        run: |
          npm ci
          npm run lint