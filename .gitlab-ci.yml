stages:
  - validate
  - build
  - test
  - lint

check-required-files:
  stage: validate
  image: alpine:latest
  tags:
    - cs506
  script:
    - echo "Checking Sprint 0 deliverables..."
    - test -f README.md
    - test -f SKELETON.md
    - test -f STYLE.md
    - test -f ROLES.md
    - test -f .gitignore
    - test -f LOGO.png
    - test -d RESEARCH
    - echo "All required files present."

build-backend:
  stage: build
  image: eclipse-temurin:21-jdk
  tags:
    - cs506
  variables:
    GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"
  cache:
    key:
      files:
        - backend/gradle/wrapper/gradle-wrapper.properties
        - backend/build.gradle
    paths:
      - .gradle/wrapper/
      - .gradle/caches/
  script:
    - echo "Building backend..."
    - cd backend
    - chmod +x gradlew
    - ./gradlew build -x test

test-backend:
  stage: test
  image: eclipse-temurin:21-jdk
  tags:
    - cs506
  variables:
    GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"
  cache:
    key:
      files:
        - backend/gradle/wrapper/gradle-wrapper.properties
        - backend/build.gradle
    paths:
      - .gradle/wrapper/
      - .gradle/caches/
  script:
    - echo "Testing backend..."
    - cd backend
    - chmod +x gradlew
    - ./gradlew testUnit
  artifacts:
    when: always
    paths:
      - backend/build/reports/tests/testUnit/
      - backend/build/test-results/testUnit/
    reports:
      junit:
        - backend/build/test-results/testUnit/*.xml

test-backend-schema:
  stage: test
  image: eclipse-temurin:21-jdk
  tags:
    - cs506
  variables:
    GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"
  cache:
    key:
      files:
        - backend/gradle/wrapper/gradle-wrapper.properties
        - backend/build.gradle
    paths:
      - .gradle/wrapper/
      - .gradle/caches/
  script:
    - echo "Running backend schema/integration tests..."
    - cd backend
    - chmod +x gradlew
    - ./gradlew testIntegration
  artifacts:
    when: always
    paths:
      - backend/build/reports/tests/testIntegration/
      - backend/build/test-results/testIntegration/
    reports:
      junit:
        - backend/build/test-results/testIntegration/*.xml

lint-frontend:
  stage: lint 
  image: node:20-alpine
  tags:
    - cs506
  variables:
    npm_config_cache: "$CI_PROJECT_DIR/.npm"
  cache:
    key:
      files:
        - frontend/package-lock.json
    paths:
      - .npm/
      - frontend/node_modules/
  script:
    - echo "Linting frontend..."
    - cd frontend
    - npm ci
    - npm run lint

test-frontend:
  stage: test
  image: node:20-alpine
  tags:
    - cs506
  variables:
    npm_config_cache: "$CI_PROJECT_DIR/.npm"
  cache:
    key:
      files:
        - frontend/package-lock.json
    paths:
      - .npm/
      - frontend/node_modules/
  script:
    - echo "Testing frontend..."
    - cd frontend
    - npm ci
    - npm test -- --watchAll=false --passWithNoTests
