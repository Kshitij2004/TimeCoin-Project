stages:
  - validate
  - build
  - test
  - lint

# Shared change sets (YAML anchors)
.backend-rules:
  rules:
    - changes:
        - backend/**/*
        - .gitlab-ci.yml
        - docker-compose.yml
    - when: never

.frontend-rules:
  rules:
    - changes:
        - frontend/**/*
        - .gitlab-ci.yml
        - docker-compose.yml
    - when: never

# Validate (always runs)
check-required-files:
  stage: validate
  image: alpine:latest
  tags:
    - cs506
  rules:
    - when: always
  script:
    - echo "Checking Sprint 0 deliverables..."
    - test -f README.md
    - test -f SKELETON.md
    - test -f STYLE.md
    - test -f ROLES.md
    - test -f .gitignore
    - test -f LOGO.png
    - test -d RESEARCH
    - echo "All required files present."

# Backend
build-backend:
  stage: build
  image: eclipse-temurin:21-jdk
  tags:
    - cs506
  rules:
    - changes:
        - backend/**/*
        - .gitlab-ci.yml
        - docker-compose.yml
    - when: never
  variables:
    GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"
  cache:
    key:
      files:
        - backend/gradle/wrapper/gradle-wrapper.properties
        - backend/build.gradle
    paths:
      - .gradle/wrapper/
      - .gradle/caches/
  script:
    - echo "Building backend..."
    - cd backend
    - chmod +x gradlew
    - ./gradlew build -x test

test-backend:
  stage: test
  image: eclipse-temurin:21-jdk
  tags:
    - cs506
  rules:
    - changes:
        - backend/**/*
        - .gitlab-ci.yml
        - docker-compose.yml
    - when: never
  needs:
    - job: build-backend
  variables:
    GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"
  cache:
    key:
      files:
        - backend/gradle/wrapper/gradle-wrapper.properties
        - backend/build.gradle
    paths:
      - .gradle/wrapper/
      - .gradle/caches/
  script:
    - echo "Running backend unit tests..."
    - cd backend
    - chmod +x gradlew
    - ./gradlew testUnit jacocoTestReport
  coverage: '/Total.*?([0-9]{1,3})%/'
  artifacts:
    when: always
    paths:
      - backend/build/reports/tests/testUnit/
      - backend/build/test-results/testUnit/
      - backend/build/reports/jacoco/jacocoTestReport/html/
    reports:
      junit:
        - backend/build/test-results/testUnit/*.xml
      coverage_report:
        coverage_format: cobertura
        path: backend/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml

test-schema:
  stage: test
  image: eclipse-temurin:21-jdk
  tags:
    - cs506
  rules:
    - changes:
        - backend/**/*
        - .gitlab-ci.yml
        - docker-compose.yml
    - when: never
  needs:
    - job: build-backend
  variables:
    GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"
  cache:
    key:
      files:
        - backend/gradle/wrapper/gradle-wrapper.properties
        - backend/build.gradle
    paths:
      - .gradle/wrapper/
      - .gradle/caches/
  script:
    - echo "Running backend schema/integration tests..."
    - cd backend
    - chmod +x gradlew
    - ./gradlew testIntegration
  artifacts:
    when: always
    paths:
      - backend/build/reports/tests/testIntegration/
      - backend/build/test-results/testIntegration/
    reports:
      junit:
        - backend/build/test-results/testIntegration/*.xml

# Frontend
build-frontend:
  stage: build
  image: node:20-alpine
  tags:
    - cs506
  rules:
    - changes:
        - frontend/**/*
        - .gitlab-ci.yml
        - docker-compose.yml
    - when: never
  variables:
    npm_config_cache: "$CI_PROJECT_DIR/.npm"
  cache:
    key:
      files:
        - frontend/package-lock.json
    paths:
      - .npm/
  script:
    - echo "Building frontend..."
    - cd frontend
    - npm ci
    - npm run build

test-frontend:
  stage: test
  image: node:20-alpine
  tags:
    - cs506
  rules:
    - changes:
        - frontend/**/*
        - .gitlab-ci.yml
        - docker-compose.yml
    - when: never
  needs:
    - job: build-frontend
  variables:
    npm_config_cache: "$CI_PROJECT_DIR/.npm"
    JEST_JUNIT_OUTPUT_DIR: "$CI_PROJECT_DIR/frontend"
    JEST_JUNIT_OUTPUT_NAME: "junit.xml"
  cache:
    key:
      files:
        - frontend/package-lock.json
    paths:
      - .npm/
  script:
    - echo "Running frontend tests..."
    - cd frontend
    - npm ci
    - npm test -- --watchAll=false --passWithNoTests --coverage --coverageReporters=text --coverageReporters=html --coverageReporters=cobertura --reporters=default --reporters=jest-junit
  coverage: '/Statements\s*:\s*([0-9.]+)%/'
  artifacts:
    when: always
    paths:
      - frontend/junit.xml
      - frontend/coverage/
    reports:
      junit:
        - frontend/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: frontend/coverage/cobertura-coverage.xml

lint-frontend:
  stage: lint
  image: node:20-alpine
  tags:
    - cs506
  rules:
    - changes:
        - frontend/**/*
        - .gitlab-ci.yml
        - docker-compose.yml
    - when: never
  needs:
    - job: build-frontend
  variables:
    npm_config_cache: "$CI_PROJECT_DIR/.npm"
  cache:
    key:
      files:
        - frontend/package-lock.json
    paths:
      - .npm/
  script:
    - echo "Linting frontend..."
    - cd frontend
    - npm ci
    - npm run lint