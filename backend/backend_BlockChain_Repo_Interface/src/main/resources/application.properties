# HTTP port exposed by the Spring Boot service.
server.port=8080

# Connection settings for the MySQL database container.
spring.datasource.url=jdbc:mysql://db:3306/crypto_marketplace?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=team12admin
spring.datasource.password=team12pass

# Hibernate updates the schema automatically and logs SQL for debugging.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
