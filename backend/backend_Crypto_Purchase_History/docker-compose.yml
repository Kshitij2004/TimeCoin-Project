services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: history_backend
    restart: unless-stopped
    environment:
      PORT: 8080
      DB_HOST: host.docker.internal
      DB_PORT: 3306
      DB_USER: app_user
      DB_PASSWORD: app_password
      DB_NAME: crypto_db
    ports:
      - "8080:8080"
