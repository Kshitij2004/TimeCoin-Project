spring.datasource.url=jdbc:mysql://db:3306/crypto_marketplace?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=team12admin
spring.datasource.password=team12pass

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

server.port=8080

spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.initialization-fail-timeout=60000

# Dev/test toggle: private key is returned only once in register response.
# Set to false in production.
wallet.expose-private-key-on-create=true

# JWT configuration
jwt.secret=your-super-secret-key-change-this-in-production
jwt.expiry-hours=1
jwt.refresh-expiry-days=7

# Trading agents
agents.enabled=true
agents.trade-interval-ms=10000
agents.min-trade-amount=0.5
agents.max-trade-amount=10.0

# Block assembly configuration
block.assembly.enabled=true
block.assembly.interval=30000

# Rate limit test agent (disabled by default, enable only for testing)
ratelimit.test.enabled=false
ratelimit.test.target-url=http://localhost:8080/api/coin
ratelimit.test.burst-size=100
ratelimit.test.delay-between-bursts-ms=60000

# Rate limiting (requests per minute, per client)
# Auth endpoints keyed by IP; protected endpoints keyed by user
ratelimit.login.per-minute=10
ratelimit.register.per-minute=5
ratelimit.refresh.per-minute=20
ratelimit.tfa.per-minute=10
ratelimit.transaction.per-minute=30
ratelimit.coin-read.per-minute=60
ratelimit.mine.per-minute=60

# price engine sensitivity multiplier (higher = more volatile price)
price-engine.sensitivity=100


# Mining
mining.enabled=true
mining.cooldown-seconds=5
mining.reward=1.00000000
mining.window-seconds=30
mining.halving-enabled=true
mining.halving-threshold=100000.00000000
