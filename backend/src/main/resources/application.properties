spring.datasource.url=jdbc:mysql://db:3306/crypto_marketplace?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=team12admin
spring.datasource.password=team12pass

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

server.port=8080

spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.initialization-fail-timeout=60000

# Dev/test toggle: private key is returned only once in register response.
# Set to false in production.
wallet.expose-private-key-on-create=true

# JWT configuration
jwt.secret=your-super-secret-key-change-this-in-production
jwt.expiry-hours=1
jwt.refresh-expiry-days=7


# Trading agents
agents.enabled=true
agents.trade-interval-ms=30000
agents.min-trade-amount=0.5
agents.max-trade-amount=10.0

# Block assembly configuration
block.assembly.enabled=true
block.assembly.interval=30000

