services:

  # Runs the init.sql schema on first boot
  # Credentials are hardcoded for dev convenience, but should be changed for production
  db:
    build: ./db
    environment:
      MYSQL_ROOT_PASSWORD: team12root
      MYSQL_DATABASE: crypto_marketplace
      MYSQL_USER: team12admin
      MYSQL_PASSWORD: team12pass
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Waits for the db healthcheck to pass before starting. Extended Hikari
  # timeouts handle the race condition where MySQL briefly restarts during
  # init - without these, the connection pool gives up too early and the
  # backend exits.
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/crypto_marketplace
      SPRING_DATASOURCE_USERNAME: team12admin
      SPRING_DATASOURCE_PASSWORD: team12pass
      SPRING_DATASOURCE_HIKARI_CONNECTION-TIMEOUT: 60000 # added per race condition where MySQL would restart, 
                                                         # but Spring tries connection during restart
      SPRING_DATASOURCE_HIKARI_INITIALIZATION-FAIL-TIMEOUT: 60000
      JWT_SECRET: team12jwtsecret2026supersecurekey!! # needs to be at least 32 chars for HS256, but should be much longer in production
      JWT_EXPIRY_HOURS: 1 # see issue 124 for details on implementation of JWT expiry
      JWT_REFRESH_EXPIRY_DAYS: 7

  # Depends on backend being up so API proxy configuration resolves correctly.
  # CHOKIDAR_USEPOLLING enables hot-reload inside Docker on Linux hosts, which is necessary for development but can be removed for production.
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - CHOKIDAR_USEPOLLING=true
      - REACT_APP_API_URL=http://localhost:8080

volumes:
  mysql-data:
